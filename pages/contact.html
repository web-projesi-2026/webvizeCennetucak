<body>
  <div id="particles"></div>

  <header>
    <div class="logo">Cennet UÇAK</div>
    <nav>
      <a href="../index.html">Anasayfa</a>
      <a href="about.html">Hakkımda</a>
      <a href="projects.html">Projeler</a>
      <a href="contact.html" class="active">İletişim</a>
    </nav>
  </header>

  <section class="page-section">
    <div class="content-box">
      <h2 class="section-title">İletişim</h2>
      <p class="section-subtitle">
        Benimle iletişime geçmek için aşağıdaki formu kullanabilirsiniz.
      </p>

      <form action="https://formsubmit.co/ucakcennet83@gmail.com" method="POST" class="contact-form">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_subject" value="Portfolyo sitesinden yeni mesaj">
        <input type="hidden" name="_next" value="https://kullaniciadi.github.io/repo-adi/pages/contact.html">

        <div class="form-group">
          <label for="name">Ad Soyad</label>
          <input type="text" id="name" name="name" placeholder="Adınızı girin" required>
        </div>

        <div class="form-group">
          <label for="email">E-posta</label>
          <input type="email" id="email" name="email" placeholder="E-posta adresinizi girin" required>
        </div>

        <div class="form-group">
          <label for="message">Mesaj</label>
          <textarea id="message" name="message" placeholder="Mesajınızı yazın" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Gönder</button>
      </form>
    </div>
  </section>

  <footer>© 2026 C. UÇAK Portfolyo | İletişim</footer>

  <script src="../asset/anim.js"></script>
